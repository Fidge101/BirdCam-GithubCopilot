<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BirdCam Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f10;
      --panel: #161a1d;
      --amber: #f5a623;
      --cyan: #00c8b4;
      --text: #d7dadc;
      --muted: #8e959b;
      --ok: #35d07f;
      --err: #ff4d5a;
      --transition: 200ms ease;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      overflow: hidden;
    }
    h1, h2, h3 { font-family: 'Syne', sans-serif; margin: 0; }
    .dash {
      display: grid;
      grid-template-columns: 3fr 5fr 2fr;
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #20262a;
      border-radius: 10px;
      padding: 12px;
      transition: all var(--transition);
      min-height: 0;
      overflow: hidden;
    }
    .left, .right { display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #2b3136;
      background: #13181b;
      color: var(--text);
      font-size: 12px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
      background: var(--err);
    }
    .dot.live { background: var(--ok); }
    @keyframes pulse { 0% { opacity: .4; } 50% { opacity: 1; } 100% { opacity: .4; } }

    .metric { color: var(--muted); font-size: 12px; }
    .metric strong { color: var(--cyan); font-weight: 500; }
    .btn {
      border: 1px solid #2a3034;
      background: #101518;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
      font-size: 12px;
      min-height: 36px;
    }
    .btn:hover { border-color: var(--amber); color: var(--amber); }
    .btn.primary { background: rgba(245,166,35,.1); border-color: var(--amber); color: var(--amber); }
    .btn.cyan { border-color: var(--cyan); color: var(--cyan); background: rgba(0,200,180,.1); }
    .divider { height: 1px; background: #23292d; margin: 4px 0; }

    details {
      border: 1px solid #242a2f;
      border-radius: 8px;
      padding: 8px;
      background: #12171a;
    }
    summary { cursor: pointer; color: var(--amber); }
    .field { display: grid; gap: 5px; margin-top: 8px; }
    label { color: var(--muted); font-size: 12px; }
    input[type="range"], input[type="number"] { width: 100%; }
    input[type="number"] {
      background: #0f1315; color: var(--text); border: 1px solid #2a3035;
      border-radius: 6px; padding: 7px;
      font-family: inherit;
    }

    .feed-wrap {
      position: relative;
      height: 100%;
      min-height: 380px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a3034;
      background: #0d1012;
    }
    #streamImg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #090b0c;
    }
    .feed-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.05),
        rgba(0, 0, 0, 0.05) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: .04;
    }
    .feed-label {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 12px;
      color: var(--amber);
      background: rgba(0,0,0,.5);
      border: 1px solid #394147;
      border-radius: 6px;
      padding: 4px 8px;
      z-index: 4;
    }
    .feed-live-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
      min-height: 30px;
      padding: 4px 8px;
      font-size: 11px;
      background: rgba(0,0,0,.55);
      border-color: #394147;
    }
    .watermark {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-size: 12px;
      color: #d2d4d7;
      background: rgba(0,0,0,.45);
      border-radius: 6px;
      padding: 4px 7px;
      z-index: 4;
    }
    #noSignal {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      color: var(--err);
      z-index: 3;
      font-size: 26px;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(255,77,90,.35);
      background:
        linear-gradient(0deg, rgba(0,0,0,.72), rgba(0,0,0,.72)),
        repeating-linear-gradient(90deg, #1a1f22 0 2px, #0f1215 2px 4px);
      animation: noise 0.2s infinite steps(2);
    }
    @keyframes noise {
      0% { transform: translateX(0); }
      50% { transform: translateX(1px); }
      100% { transform: translateX(0); }
    }

    .frames-head { display: flex; justify-content: space-between; align-items: center; }
    .frames-head-actions { display: flex; align-items: center; gap: 8px; }
    .timelapse-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .timelapse-actions .btn { flex: 1; min-width: 120px; }
    .export-browser {
      display: grid;
      gap: 8px;
      margin-top: 6px;
      border: 1px solid #2a3034;
      border-radius: 8px;
      padding: 8px;
      background: #11161a;
    }
    .export-browser label {
      font-size: 11px;
    }
    #exportDateSelect {
      width: 100%;
      background: #0f1315;
      color: var(--text);
      border: 1px solid #2a3035;
      border-radius: 6px;
      padding: 7px;
      font-family: inherit;
      font-size: 12px;
    }
    #frameDateSelect {
      width: 100%;
      background: #0f1315;
      color: var(--text);
      border: 1px solid #2a3035;
      border-radius: 6px;
      padding: 7px;
      font-family: inherit;
      font-size: 12px;
    }
    #timelapsePresetSelect {
      width: 100%;
      background: #0f1315;
      color: var(--text);
      border: 1px solid #2a3035;
      border-radius: 6px;
      padding: 7px;
      font-family: inherit;
      font-size: 12px;
    }
    #exportStartDateSelect,
    #exportEndDateSelect {
      width: 100%;
      background: #0f1315;
      color: var(--text);
      border: 1px solid #2a3035;
      border-radius: 6px;
      padding: 7px;
      font-family: inherit;
      font-size: 12px;
    }
    #exportFileList {
      display: grid;
      gap: 6px;
      max-height: 140px;
      overflow: auto;
      padding-right: 3px;
    }
    .export-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      border: 1px solid #2a3034;
      border-radius: 6px;
      padding: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .merge-status {
      display: grid;
      gap: 5px;
      border: 1px solid #2a3034;
      border-radius: 6px;
      padding: 6px;
      background: #0f1315;
    }
    #mergeStatusText {
      font-size: 11px;
      color: var(--muted);
    }
    .merge-progress {
      width: 100%;
      height: 8px;
      background: #1d2327;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #2a3035;
    }
    #mergeProgressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f5a623, #00c8b4);
      transition: width 200ms ease;
    }
    #frameCountBadge {
      border: 1px solid #2b3237;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--amber);
    }
    .thumb-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      flex: 1;
      max-height: 42vh;
      align-content: start;
      padding-right: 4px;
    }
    .thumb {
      position: relative;
      border: 1px solid #2a3035;
      border-radius: 8px;
      overflow: hidden;
      background: #0f1315;
      cursor: pointer;
    }
    .thumb img {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #0b0d0f;
    }
    .thumb-info {
      padding: 4px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .thumb-del {
      position: absolute;
      top: 4px;
      right: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      border: 1px solid var(--err);
      color: var(--err);
      background: rgba(0,0,0,.5);
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .thumb:hover .thumb-del { opacity: 1; }

    .bottom {
      border-top: 1px solid #23292d;
      background: #0b0d0e;
      padding: 8px 12px;
      display: grid;
      gap: 8px;
    }
    .log-head { display: flex; align-items: center; justify-content: space-between; }
    #logsBody { display: none; }
    #logOutput {
      background: #0e1214;
      border: 1px solid #1d2327;
      border-radius: 8px;
      min-height: 120px;
      max-height: 220px;
      overflow: auto;
      margin-top: 8px;
      padding: 8px;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .log-line.info { color: #a0a6ab; }
    .log-line.warning { color: var(--amber); }
    .log-line.error { color: var(--err); }

    #toastArea {
      position: fixed;
      top: 12px;
      right: 12px;
      display: grid;
      gap: 8px;
      z-index: 100;
    }
    .toast {
      min-width: 220px;
      border: 1px solid;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      background: #11161a;
      animation: fadein var(--transition);
    }
    .toast.success { border-color: var(--cyan); color: var(--cyan); }
    .toast.warning { border-color: var(--amber); color: var(--amber); }
    .toast.error { border-color: var(--err); color: var(--err); }
    @keyframes fadein { from { opacity: 0; transform: translateY(-3px);} to { opacity:1; transform: translateY(0);} }

    #lightbox {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,.84);
      z-index: 200;
    }
    #lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      border: 1px solid #353c42;
      border-radius: 10px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #2e3439;
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg);} }

    @media (max-width: 1200px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow: auto;
        grid-template-rows: auto auto;
      }
      .dash {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        overflow: visible;
      }
      .feed-wrap { min-height: 340px; }
    }

    @media (max-width: 900px) {
      .dash {
        padding: 10px;
        gap: 10px;
      }
      .panel {
        padding: 10px;
      }
      .row {
        flex-wrap: wrap;
      }
      .row .btn,
      .row button,
      .row input,
      .row span {
        width: 100%;
      }
      .timelapse-actions {
        flex-direction: column;
      }
      .timelapse-actions .btn {
        width: 100%;
      }
      .frames-head {
        flex-wrap: wrap;
      }
      .frames-head-actions {
        width: 100%;
      }
      .frames-head-actions .btn {
        width: 100%;
      }
      .thumb-grid {
        grid-template-columns: 1fr 1fr;
        max-height: 320px;
      }
      .bottom {
        padding: 8px 10px;
      }
    }

    @media (max-width: 640px) {
      h2 { font-size: 1.1rem; }
      h3 { font-size: 1rem; }
      .metric,
      label,
      .btn,
      .status-badge,
      .feed-label,
      .watermark {
        font-size: 11px;
      }
      .btn {
        min-height: 40px;
        padding: 10px;
      }
      .feed-wrap {
        min-height: 240px;
      }
      .thumb-grid {
        grid-template-columns: 1fr;
        max-height: 280px;
      }
      #logOutput {
        max-height: 180px;
      }
      #toastArea {
        left: 10px;
        right: 10px;
      }
      .toast {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dash">
    <section class="panel left">
      <h2>Camera Status</h2>
      <div class="row">
        <span class="status-badge"><span id="statusDot" class="dot"></span><span id="statusText">OFFLINE</span></span>
        <span id="clock" class="metric">--:--:--</span>
      </div>
      <div class="metric">Uptime: <strong id="uptime">0s</strong></div>
      <div class="metric">CPU Temp: <strong id="cpuTemp">--</strong></div>
      <div class="metric">Frames: <strong id="frameCount">0</strong></div>
      <button id="captureBtn" class="btn primary">Capture Frame Now</button>
      <button id="reconnectBtn" class="btn">Reconnect Camera</button>

      <div class="divider"></div>

      <details>
        <summary>Config</summary>
        <div class="field">
          <label for="intervalSlider">Capture interval <span id="intervalLabel">every 1 minute</span></label>
          <input id="intervalSlider" type="range" min="10" max="3600" value="60" />
        </div>
        <div class="field">
          <label for="maxFramesInput">Max frames</label>
          <input id="maxFramesInput" type="number" min="1" value="100" />
        </div>
        <div class="field">
          <label for="timelapsePresetSelect">Timelapse resolution preset</label>
          <select id="timelapsePresetSelect">
            <option value="320x180">320x180</option>
            <option value="640x360">640x360</option>
            <option value="960x540">960x540</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="row" style="margin-top:4px;">
          <div class="field" style="margin:0; flex: 1;">
            <label for="timelapseWidthInput">Timelapse width</label>
            <input id="timelapseWidthInput" type="number" min="64" max="3840" value="320" />
          </div>
          <div class="field" style="margin:0; flex: 1;">
            <label for="timelapseHeightInput">Timelapse height</label>
            <input id="timelapseHeightInput" type="number" min="64" max="2160" value="180" />
          </div>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="saveConfigBtn" class="btn cyan">Save Config</button>
          <span id="configMsg" class="metric"></span>
        </div>
      </details>
    </section>

    <section class="panel">
      <div class="feed-wrap">
        <div class="feed-label">CAM 01 / LIVE</div>
        <button id="openLiveFeedBtn" class="btn feed-live-btn">Hi Res</button>
        <img id="streamImg" src="/stream/sd" alt="Camera live feed" />
        <div id="noSignal">NO SIGNAL</div>
        <div id="watermark" class="watermark">--</div>
      </div>
    </section>

    <section class="panel right">
      <div class="frames-head">
        <div class="frames-head-actions">
          <h3>Frames & Timelapse</h3>
          <span id="frameCountBadge">0</span>
        </div>
        <a href="/viewer" class="btn">Open Image Viewer</a>
      </div>
      <div class="export-browser">
        <label for="frameDateSelect">Source Images By Date</label>
        <div class="row">
          <select id="frameDateSelect"></select>
          <button id="refreshFrameDatesBtn" class="btn">Refresh</button>
        </div>
        <div id="timelapseStatusText" class="metric">Use a date to filter the gallery and generate exports for that day.</div>
      </div>
      <div class="row timelapse-actions">
          <button id="timelapseMp4Btn" class="btn">Generate MP4<span id="timelapseSpin" style="display:none" class="spinner"></span></button>
      </div>
      <div class="row timelapse-actions">
        <button id="viewTimelapseMp4Btn" class="btn" disabled>Download MP4</button>
      </div>
      <div class="export-browser">
        <label for="exportDateSelect">Daily Exports By Date</label>
        <div class="row">
          <select id="exportDateSelect"></select>
          <button id="refreshExportsBtn" class="btn">Refresh</button>
        </div>
        <label>Stitch MP4 Date Range</label>
        <div class="row">
          <select id="exportStartDateSelect"></select>
          <select id="exportEndDateSelect"></select>
        </div>
        <button id="downloadMergedMp4Btn" class="btn" disabled>Download Stitched MP4</button>
        <div class="merge-status">
          <div id="mergeStatusText">No merge job started</div>
          <div class="merge-progress"><div id="mergeProgressBar"></div></div>
        </div>
        <div id="exportFileList"></div>
      </div>
      <button id="clearFramesBtn" class="btn">Clear All Frames</button>
      <div id="thumbGrid" class="thumb-grid"></div>
    </section>
  </div>

  <section class="bottom">
    <div class="log-head">
      <button id="toggleLogsBtn" class="btn">Show Logs</button>
      <button id="clearLogsBtn" class="btn">Clear</button>
    </div>
    <div id="logsBody">
      <div id="logOutput"></div>
    </div>
  </section>

  <div id="toastArea"></div>

  <div id="lightbox">
    <img id="lightboxImg" alt="Preview" />
  </div>

  <script>
    const state = {
      logsSource: null,
      logsOpen: false,
      maxLogLines: 200,
      streamHealthy: true,
      timelapsePollHandle: null,
      mergePollHandle: null,
      mergeDownloadUrl: null,
    };

    function formatUptime(totalSeconds) {
      const s = Number(totalSeconds || 0);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${h}h ${m}m ${sec}s`;
    }

    function intervalLabel(seconds) {
      const minutes = Math.max(1, Math.round(seconds / 60));
      return `every ${minutes} minute${minutes === 1 ? '' : 's'}`;
    }

    function showToast(message, type = 'warning') {
      const toastArea = document.getElementById('toastArea');
      const node = document.createElement('div');
      node.className = `toast ${type}`;
      node.textContent = message;
      toastArea.appendChild(node);
      setTimeout(() => node.remove(), 3000);
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let body = null;
      try { body = await res.json(); } catch (_) { body = null; }
      if (!res.ok) {
        const errorMessage = body?.error || `${res.status} ${res.statusText}`;
        throw new Error(errorMessage);
      }
      return body;
    }

    /*
      === STATUS POLLING ===
      Inputs: none (reads /api/status and /api/config).
      Outputs: updates status widgets, clock, metrics, and config controls.
      Why: keeps dashboard telemetry fresh without page reload.
    */
    function initStatusPolling() {
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const uptimeEl = document.getElementById('uptime');
      const cpuTempEl = document.getElementById('cpuTemp');
      const frameCountEl = document.getElementById('frameCount');
      const frameCountBadge = document.getElementById('frameCountBadge');
      const clock = document.getElementById('clock');
      const watermark = document.getElementById('watermark');

      const tickClock = () => {
        const now = new Date();
        const stamp = now.toLocaleString();
        clock.textContent = stamp;
        watermark.textContent = stamp;
      };
      tickClock();
      setInterval(tickClock, 1000);

      const refreshStatus = async () => {
        try {
          const status = await api('/api/status');
          const live = !!status.camera_connected;
          statusDot.classList.toggle('live', live);
          statusText.textContent = live ? 'LIVE' : 'OFFLINE';
          uptimeEl.textContent = formatUptime(status.uptime_seconds);
          cpuTempEl.textContent = status.cpu_temp_c == null ? 'n/a' : `${status.cpu_temp_c}°C`;
          frameCountEl.textContent = String(status.frame_count ?? 0);
          frameCountBadge.textContent = `${status.frame_count ?? 0}`;
        } catch (err) {
          showToast(`Status error: ${err.message}`, 'error');
        }
      };

      const loadConfig = async () => {
        try {
          const cfg = await api('/api/config');
          const slider = document.getElementById('intervalSlider');
          const label = document.getElementById('intervalLabel');
          const maxFrames = document.getElementById('maxFramesInput');
          const timelapseWidth = document.getElementById('timelapseWidthInput');
          const timelapseHeight = document.getElementById('timelapseHeightInput');
          const timelapsePreset = document.getElementById('timelapsePresetSelect');
          slider.value = String(cfg.capture_interval_seconds);
          label.textContent = intervalLabel(cfg.capture_interval_seconds);
          maxFrames.value = String(cfg.max_frames);
          const width = Number(cfg.timelapse_width ?? 320);
          const height = Number(cfg.timelapse_height ?? 180);
          timelapseWidth.value = String(width);
          timelapseHeight.value = String(height);

          const presetValue = `${width}x${height}`;
          if (["320x180", "640x360", "960x540"].includes(presetValue)) {
            timelapsePreset.value = presetValue;
          } else {
            timelapsePreset.value = 'custom';
          }
        } catch (err) {
          showToast(`Config load failed: ${err.message}`, 'warning');
        }
      };

      refreshStatus();
      loadConfig();
      setInterval(refreshStatus, 5000);
    }

    /*
      === STREAM HEALTH CHECK ===
      Inputs: stream image load/error events.
      Outputs: toggles NO SIGNAL placeholder visibility.
      Why: degrades gracefully when camera or network is unavailable.
    */
    function initStreamHealthCheck() {
      const img = document.getElementById('streamImg');
      const noSignal = document.getElementById('noSignal');
      const openLiveFeedBtn = document.getElementById('openLiveFeedBtn');

      const setHealth = (ok) => {
        state.streamHealthy = ok;
        noSignal.style.display = ok ? 'none' : 'grid';
      };

      img.addEventListener('load', () => setHealth(true));
      img.addEventListener('error', () => setHealth(false));

      openLiveFeedBtn.addEventListener('click', () => {
        const liveWindow = window.open('/live', '_blank', 'noopener');
        if (!liveWindow) {
          window.location.assign('/live');
        }
      });

      setHealth(true);
    }

    /*
      === FRAME GALLERY ===
      Inputs: /api/frames data and user click/delete actions.
      Outputs: thumbnail grid rendering, preview open, frame deletion.
      Why: enables quick inspection and cleanup of captured frames.
    */
    function initFrameGallery() {
      const grid = document.getElementById('thumbGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const clearFramesBtn = document.getElementById('clearFramesBtn');
      const frameDateSelect = document.getElementById('frameDateSelect');
      const refreshFrameDatesBtn = document.getElementById('refreshFrameDatesBtn');

      const selectedDateQuery = () => {
        const value = frameDateSelect.value;
        return value ? `?date=${encodeURIComponent(value)}` : '';
      };

      const loadFrameDates = async () => {
        try {
          const dates = await api('/api/frames/dates');
          const previousValue = frameDateSelect.value;
          frameDateSelect.innerHTML = '';

          const allOption = document.createElement('option');
          allOption.value = '';
          allOption.textContent = 'All images';
          frameDateSelect.appendChild(allOption);

          dates.forEach((entry) => {
            const option = document.createElement('option');
            option.value = entry.date;
            option.textContent = `${entry.date} (${entry.count} images)`;
            frameDateSelect.appendChild(option);
          });

          if ([...frameDateSelect.options].some((option) => option.value === previousValue)) {
            frameDateSelect.value = previousValue;
          }
        } catch (err) {
          showToast(`Frame dates failed: ${err.message}`, 'warning');
        }
      };

      const openLightbox = (src) => {
        lightboxImg.src = src;
        lightbox.style.display = 'grid';
      };

      lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none';
      });

      const renderFrames = async () => {
        try {
          const frames = await api(`/api/frames${selectedDateQuery()}`);
          grid.innerHTML = '';
          for (const frame of frames) {
            const card = document.createElement('div');
            card.className = 'thumb';

            const image = document.createElement('img');
            const frameUrl = frame.url || `/api/frames/${encodeURIComponent(frame.filename)}`;
            image.src = frameUrl;
            image.alt = frame.filename;
            image.addEventListener('click', () => openLightbox(image.src));

            const del = document.createElement('button');
            del.className = 'thumb-del';
            del.textContent = 'DEL';
            del.addEventListener('click', async (event) => {
              event.stopPropagation();
              if (!confirm(`Delete ${frame.filename}?`)) return;
              try {
                await api(`/api/frames/${encodeURIComponent(frame.filename)}`, { method: 'DELETE' });
                showToast('Frame deleted', 'success');
                renderFrames();
              } catch (err) {
                showToast(`Delete failed: ${err.message}`, 'error');
              }
            });

            const info = document.createElement('div');
            info.className = 'thumb-info';
            info.textContent = `${frame.filename} • ${new Date(frame.timestamp).toLocaleString()}`;

            card.appendChild(image);
            card.appendChild(del);
            card.appendChild(info);
            card.addEventListener('click', () => openLightbox(image.src));
            grid.appendChild(card);
          }
        } catch (err) {
          showToast(`Frames load failed: ${err.message}`, 'error');
        }
      };

      clearFramesBtn.addEventListener('click', async () => {
        if (!confirm('Delete all frames?')) return;
        try {
          await api('/api/frames', { method: 'DELETE' });
          showToast('All frames cleared', 'success');
          await loadFrameDates();
          renderFrames();
        } catch (err) {
          showToast(`Clear failed: ${err.message}`, 'error');
        }
      });

      frameDateSelect.addEventListener('change', () => {
        renderFrames();
        if (window.onFrameDateChanged) {
          window.onFrameDateChanged(frameDateSelect.value);
        }
      });

      refreshFrameDatesBtn.addEventListener('click', async () => {
        await loadFrameDates();
        renderFrames();
        if (window.onFrameDateChanged) {
          window.onFrameDateChanged(frameDateSelect.value);
        }
      });

      window.refreshFrames = renderFrames;
      window.getSelectedFrameDate = () => frameDateSelect.value;
      window.refreshFrameDates = loadFrameDates;
      loadFrameDates().then(renderFrames);
      setInterval(renderFrames, 8000);
      setInterval(loadFrameDates, 30000);
    }

    /*
      === TIMELAPSE ===
      Inputs: generate button click and /api/status + preview endpoint.
      Outputs: timelapse job trigger, spinner state, and preview rendering.
      Why: allows on-demand timelapse generation without shell access.
    */
    function initTimelapse() {
      const mp4Btn = document.getElementById('timelapseMp4Btn');
      const spin = document.getElementById('timelapseSpin');
      const statusText = document.getElementById('timelapseStatusText');
      const viewMp4Btn = document.getElementById('viewTimelapseMp4Btn');
      const frameDateSelect = document.getElementById('frameDateSelect');
      const exportDateSelect = document.getElementById('exportDateSelect');
      const exportStartDateSelect = document.getElementById('exportStartDateSelect');
      const exportEndDateSelect = document.getElementById('exportEndDateSelect');
      const refreshExportsBtn = document.getElementById('refreshExportsBtn');
      const downloadMergedMp4Btn = document.getElementById('downloadMergedMp4Btn');
      const mergeStatusText = document.getElementById('mergeStatusText');
      const mergeProgressBar = document.getElementById('mergeProgressBar');
      const exportFileList = document.getElementById('exportFileList');

      const getSelectedDate = () => {
        const selected = typeof window.getSelectedFrameDate === 'function' ? window.getSelectedFrameDate() : frameDateSelect?.value;
        return selected || '';
      };

      const scopeQuery = () => {
        const selectedDate = getSelectedDate();
        return selectedDate ? `?date=${encodeURIComponent(selectedDate)}` : '';
      };

      const setGenerateButtonsDisabled = (disabled) => {
        mp4Btn.disabled = disabled;
      };

      const syncMergeDownloadState = () => {
        const start = exportStartDateSelect.value;
        const end = exportEndDateSelect.value;
        if (state.mergeDownloadUrl) {
          downloadMergedMp4Btn.disabled = false;
          downloadMergedMp4Btn.textContent = 'Download Ready MP4';
          return;
        }
        downloadMergedMp4Btn.textContent = 'Download Stitched MP4';
        downloadMergedMp4Btn.disabled = !start || !end || start > end;
      };

      const renderMergeStatus = (job) => {
        const status = job?.status || 'idle';
        const message = job?.message || 'No merge job started';
        const progress = Math.max(0, Math.min(100, Number(job?.progress || 0)));

        mergeStatusText.textContent = `${status.toUpperCase()}: ${message}`;
        mergeProgressBar.style.width = `${progress}%`;

        if (status === 'completed' && job.download_url) {
          mergeStatusText.textContent = `COMPLETED: ${message}`;
        }
      };

      const pollMergeStatus = async () => {
        try {
          const job = await api('/api/timelapse/exports/merge/status');
          renderMergeStatus(job);

          if (job.status === 'completed') {
            if (state.mergePollHandle) {
              clearInterval(state.mergePollHandle);
              state.mergePollHandle = null;
            }
            state.mergeDownloadUrl = job.download_url || null;
            syncMergeDownloadState();
            showToast('Stitched MP4 ready - click to download', 'success');
          } else if (job.status === 'error') {
            if (state.mergePollHandle) {
              clearInterval(state.mergePollHandle);
              state.mergePollHandle = null;
            }
            state.mergeDownloadUrl = null;
            syncMergeDownloadState();
            showToast(job.message || 'Merge failed', 'error');
          }
        } catch (err) {
          showToast(`Merge status failed: ${err.message}`, 'warning');
        }
      };

      const renderExportFiles = (files) => {
        exportFileList.innerHTML = '';
        if (!files.length) {
          const empty = document.createElement('div');
          empty.className = 'metric';
          empty.textContent = 'No exports found for selected date';
          exportFileList.appendChild(empty);
          return;
        }

        files.forEach((entry) => {
          const row = document.createElement('div');
          row.className = 'export-item';

          const name = document.createElement('span');
          name.textContent = `${entry.name} (${entry.size_kb} KB)`;

          const button = document.createElement('button');
          button.className = 'btn';
          button.textContent = 'Open';
          button.addEventListener('click', () => {
            window.open(entry.url, '_blank', 'noopener');
          });

          row.appendChild(name);
          row.appendChild(button);
          exportFileList.appendChild(row);
        });
      };

      const loadExportDates = async () => {
        try {
          const dates = await api('/api/timelapse/exports/dates');
          const selectedFrameDate = getSelectedDate();
          const previousSingleDate = exportDateSelect.value;
          const previousStartDate = exportStartDateSelect.value;
          const previousEndDate = exportEndDateSelect.value;

          exportDateSelect.innerHTML = '';
          exportStartDateSelect.innerHTML = '';
          exportEndDateSelect.innerHTML = '';

          if (!dates.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No daily exports';
            exportDateSelect.appendChild(option);

            const emptyStartOption = document.createElement('option');
            emptyStartOption.value = '';
            emptyStartOption.textContent = 'No start date';
            exportStartDateSelect.appendChild(emptyStartOption);

            const emptyEndOption = document.createElement('option');
            emptyEndOption.value = '';
            emptyEndOption.textContent = 'No end date';
            exportEndDateSelect.appendChild(emptyEndOption);

            renderExportFiles([]);
            syncMergeDownloadState();
            return;
          }

          dates.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.date;
            option.textContent = `${item.date} (${item.file_count} files)`;
            exportDateSelect.appendChild(option);

            const startOption = document.createElement('option');
            startOption.value = item.date;
            startOption.textContent = item.date;
            exportStartDateSelect.appendChild(startOption);

            const endOption = document.createElement('option');
            endOption.value = item.date;
            endOption.textContent = item.date;
            exportEndDateSelect.appendChild(endOption);
          });

          if (previousSingleDate && dates.some((item) => item.date === previousSingleDate)) {
            exportDateSelect.value = previousSingleDate;
          }
          if (selectedFrameDate && dates.some((item) => item.date === selectedFrameDate)) {
            exportDateSelect.value = selectedFrameDate;
          }
          if (previousStartDate && dates.some((item) => item.date === previousStartDate)) {
            exportStartDateSelect.value = previousStartDate;
          }
          if (previousEndDate && dates.some((item) => item.date === previousEndDate)) {
            exportEndDateSelect.value = previousEndDate;
          }

          if (!exportStartDateSelect.value) {
            exportStartDateSelect.value = dates[dates.length - 1].date;
          }
          if (!exportEndDateSelect.value) {
            exportEndDateSelect.value = dates[0].date;
          }

          syncMergeDownloadState();
          await loadExportFilesForSelectedDate();
        } catch (err) {
          showToast(`Export dates failed: ${err.message}`, 'warning');
        }
      };

      const loadExportFilesForSelectedDate = async () => {
        const selectedDate = exportDateSelect.value;
        if (!selectedDate) {
          renderExportFiles([]);
          return;
        }
        try {
          const files = await api(`/api/timelapse/exports?date=${encodeURIComponent(selectedDate)}`);
          renderExportFiles(files);
        } catch (err) {
          showToast(`Export files failed: ${err.message}`, 'warning');
        }
      };

      const syncTimelapseButtons = async () => {
        try {
          const info = await api(`/api/timelapse${scopeQuery()}`);
          viewMp4Btn.disabled = !info.mp4_exists;
        } catch (_) {
          viewMp4Btn.disabled = true;
        }
      };

      viewMp4Btn.addEventListener('click', () => {
        window.open(`/api/timelapse/file/mp4/download${scopeQuery()}`, '_blank', 'noopener');
      });

      const startTimelapseJob = async () => {
        const selectedDate = getSelectedDate();
        const scopeLabel = selectedDate || 'all images';
        try {
          const result = await api('/api/timelapse/generate', {
            method: 'POST',
            body: JSON.stringify({ output: 'mp4', date: selectedDate || null }),
          });
          if (result.status === 'running') {
            spin.style.display = 'inline-block';
            statusText.textContent = `Generating MP4 for ${scopeLabel}...`;
            setGenerateButtonsDisabled(true);
            if (!state.timelapsePollHandle) {
              state.timelapsePollHandle = setInterval(pollJob, 1500);
            }
          }
          showToast('MP4 export job started', 'warning');
        } catch (err) {
          showToast(`Timelapse start failed: ${err.message}`, 'error');
        }
      };

      exportDateSelect.addEventListener('change', () => {
        loadExportFilesForSelectedDate();
      });

      refreshExportsBtn.addEventListener('click', () => {
        loadExportDates();
        pollMergeStatus();
      });

      exportStartDateSelect.addEventListener('change', () => {
        state.mergeDownloadUrl = null;
        syncMergeDownloadState();
      });

      exportEndDateSelect.addEventListener('change', () => {
        state.mergeDownloadUrl = null;
        syncMergeDownloadState();
      });

      downloadMergedMp4Btn.addEventListener('click', () => {
        if (state.mergeDownloadUrl) {
          window.open(state.mergeDownloadUrl, '_blank', 'noopener');
          return;
        }

        const start = exportStartDateSelect.value;
        const end = exportEndDateSelect.value;
        if (!start || !end) {
          showToast('Select both start and end dates', 'warning');
          return;
        }
        if (start > end) {
          showToast('Start date must be before end date', 'warning');
          return;
        }

        downloadMergedMp4Btn.disabled = true;
        downloadMergedMp4Btn.textContent = 'Stitching...';
        state.mergeDownloadUrl = null;
        mergeStatusText.textContent = 'RUNNING: Starting merge...';
        mergeProgressBar.style.width = '0%';

        api('/api/timelapse/exports/merge/start', {
          method: 'POST',
          body: JSON.stringify({ start, end }),
        }).then((job) => {
          renderMergeStatus(job);
          if (!state.mergePollHandle) {
            state.mergePollHandle = setInterval(pollMergeStatus, 1500);
          }
        }).catch((err) => {
          state.mergeDownloadUrl = null;
          syncMergeDownloadState();
          showToast(`Merge start failed: ${err.message}`, 'error');
        });
      });

      const pollJob = async () => {
        try {
          const status = await api('/api/status');
          const job = status.timelapse_job || {};
          const running = job.status === 'running';
          spin.style.display = running ? 'inline-block' : 'none';
          statusText.textContent = job.message || 'Use a date to filter the gallery and generate exports for that day.';
          if (job.status === 'completed') {
            showToast('Timelapse generated', 'success');
            setGenerateButtonsDisabled(false);
            syncTimelapseButtons();
            loadExportDates();
            clearInterval(state.timelapsePollHandle);
            state.timelapsePollHandle = null;
          }
          if (job.status === 'error') {
            showToast(`Timelapse error: ${job.message}`, 'error');
            setGenerateButtonsDisabled(false);
            clearInterval(state.timelapsePollHandle);
            state.timelapsePollHandle = null;
          }
        } catch (err) {
          showToast(`Job status failed: ${err.message}`, 'warning');
        }
      };

      mp4Btn.addEventListener('click', () => startTimelapseJob());

      window.onFrameDateChanged = async (selectedDate) => {
        if (selectedDate && [...exportDateSelect.options].some((option) => option.value === selectedDate)) {
          exportDateSelect.value = selectedDate;
          await loadExportFilesForSelectedDate();
        }
        await syncTimelapseButtons();
        await loadExportDates();
      };

      syncTimelapseButtons();
      loadExportDates();
      setInterval(syncTimelapseButtons, 8000);
      setInterval(loadExportDates, 30000);
      pollMergeStatus();
    }

    /*
      === CONFIG PANEL ===
      Inputs: slider, numeric input, save button.
      Outputs: POST /api/config with mutable scheduling values.
      Why: provides safe runtime tuning for capture behavior from browser.
    */
    function initConfigPanel() {
      const intervalSlider = document.getElementById('intervalSlider');
      const intervalLabelEl = document.getElementById('intervalLabel');
      const maxFramesInput = document.getElementById('maxFramesInput');
      const timelapsePresetSelect = document.getElementById('timelapsePresetSelect');
      const timelapseWidthInput = document.getElementById('timelapseWidthInput');
      const timelapseHeightInput = document.getElementById('timelapseHeightInput');
      const saveConfigBtn = document.getElementById('saveConfigBtn');
      const configMsg = document.getElementById('configMsg');
      const captureBtn = document.getElementById('captureBtn');
      const reconnectBtn = document.getElementById('reconnectBtn');

      intervalSlider.addEventListener('input', () => {
        intervalLabelEl.textContent = intervalLabel(Number(intervalSlider.value));
      });

      timelapsePresetSelect.addEventListener('change', () => {
        const value = timelapsePresetSelect.value;
        if (value === 'custom') {
          return;
        }
        const [width, height] = value.split('x').map(Number);
        timelapseWidthInput.value = String(width);
        timelapseHeightInput.value = String(height);
      });

      const syncPresetSelection = () => {
        const presetValue = `${Number(timelapseWidthInput.value)}x${Number(timelapseHeightInput.value)}`;
        if (["320x180", "640x360", "960x540"].includes(presetValue)) {
          timelapsePresetSelect.value = presetValue;
        } else {
          timelapsePresetSelect.value = 'custom';
        }
      };

      timelapseWidthInput.addEventListener('input', syncPresetSelection);
      timelapseHeightInput.addEventListener('input', syncPresetSelection);

      saveConfigBtn.addEventListener('click', async () => {
        configMsg.textContent = '';
        try {
          const payload = {
            capture_interval_seconds: Number(intervalSlider.value),
            max_frames: Number(maxFramesInput.value),
            timelapse_width: Number(timelapseWidthInput.value),
            timelapse_height: Number(timelapseHeightInput.value),
          };
          await api('/api/config', { method: 'POST', body: JSON.stringify(payload) });
          configMsg.textContent = 'Saved';
          showToast('Config updated', 'success');
        } catch (err) {
          configMsg.textContent = 'Failed';
          showToast(`Config save failed: ${err.message}`, 'error');
        }
      });

      captureBtn.addEventListener('click', async () => {
        try {
          await api('/api/capture', { method: 'POST' });
          showToast('Frame captured', 'success');
          if (window.refreshFrames) window.refreshFrames();
        } catch (err) {
          showToast(`Capture failed: ${err.message}`, 'error');
        }
      });

      reconnectBtn.addEventListener('click', async () => {
        reconnectBtn.disabled = true;
        reconnectBtn.textContent = 'Reconnecting...';
        try {
          const response = await fetch('/api/camera/reconnect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            const errorMessage = payload?.error || `${response.status} ${response.statusText}`;
            if (response.status === 429 && Number.isFinite(payload?.retry_after_seconds)) {
              const retryAfter = Math.max(1, Number(payload.retry_after_seconds));
              reconnectBtn.textContent = `Wait ${retryAfter}s`;
              showToast(errorMessage, 'warning');
              setTimeout(() => {
                reconnectBtn.disabled = false;
                reconnectBtn.textContent = 'Reconnect Camera';
              }, retryAfter * 1000);
              return;
            }
            throw new Error(errorMessage);
          }
          showToast('Camera reconnected', 'success');
        } catch (err) {
          showToast(`Reconnect failed: ${err.message}`, 'error');
        } finally {
          if (reconnectBtn.textContent === 'Reconnecting...') {
            reconnectBtn.disabled = false;
            reconnectBtn.textContent = 'Reconnect Camera';
          }
        }
      });
    }

    /*
      === LOG STREAM ===
      Inputs: user toggles logs panel and SSE stream from /api/logs/stream.
      Outputs: live terminal-like log display with level-based colors.
      Why: keeps diagnostics visible without SSH shell tailing.
    */
    function initLogStream() {
      const toggleBtn = document.getElementById('toggleLogsBtn');
      const clearBtn = document.getElementById('clearLogsBtn');
      const logsBody = document.getElementById('logsBody');
      const output = document.getElementById('logOutput');

      const appendLine = (text) => {
        const lower = text.toLowerCase();
        const line = document.createElement('div');
        let level = 'info';
        if (lower.includes('error')) level = 'error';
        else if (lower.includes('warning')) level = 'warning';
        line.className = `log-line ${level}`;
        line.textContent = text;
        output.appendChild(line);

        while (output.children.length > state.maxLogLines) {
          output.removeChild(output.firstChild);
        }
        output.scrollTop = output.scrollHeight;
      };

      const openLogs = () => {
        if (state.logsSource) return;
        fetch('/api/logs/recent?limit=100')
          .then((response) => response.json())
          .then((payload) => {
            const lines = Array.isArray(payload.lines) ? payload.lines : [];
            lines.forEach((line) => appendLine(line));
          })
          .catch(() => {
            showToast('Unable to preload recent logs', 'warning');
          });

        state.logsSource = new EventSource('/api/logs/stream');
        state.logsSource.onmessage = (event) => appendLine(event.data);
        state.logsSource.onerror = () => showToast('Log stream disconnected', 'warning');
      };

      const closeLogs = () => {
        if (state.logsSource) {
          state.logsSource.close();
          state.logsSource = null;
        }
      };

      toggleBtn.addEventListener('click', () => {
        state.logsOpen = !state.logsOpen;
        logsBody.style.display = state.logsOpen ? 'block' : 'none';
        toggleBtn.textContent = state.logsOpen ? 'Hide Logs' : 'Show Logs';
        if (state.logsOpen) openLogs();
        else closeLogs();
      });

      clearBtn.addEventListener('click', () => {
        output.innerHTML = '';
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      initStatusPolling();
      initStreamHealthCheck();
      initFrameGallery();
      initTimelapse();
      initConfigPanel();
      initLogStream();
    });
  </script>
</body>
